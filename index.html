<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<!-- ▼ iPhoneでホーム画面に追加した時にフルスクリーンアプリ化するための設定 ▼ -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="CANDY TUNE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#eaf9fc">
<!-- ホーム画面アイコン（絵文字キャンディを使った簡易アイコンをSVGで埋め込み） -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23eaf9fc'/%3E%3Ctext x='50' y='62' font-size='52' text-anchor='middle'%3E%F0%9F%8D%AC%3C/text%3E%3C/svg%3E">

<title>CANDY TUNE | 推しSNSまとめ</title>

<!-- PWA用 manifest をインラインで生成 -->
<link rel="manifest" id="manifestLink">

<style>
  :root{
    --bg: #eaf9fc;
    --bg-soft: #ffffff;
    --card: #ffffff;
    --card-border: rgba(12, 27, 34, 0.08);
    --text: #0c1b22;
    --text-dim: #5b7b85;
    --accent: #2fd0ee; /* グループ全体テーマ：明るめの水色 */
    --accent-soft: rgba(47, 208, 238, 0.16);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    height: 100%;
    overscroll-behavior-y: none;
  }

  body{
    min-height: 100vh;
    min-height: 100dvh;
    /* ノッチ・ホームバー対応の安全余白 */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    background: radial-gradient(circle at 50% 0%, var(--bg-soft) 0%, var(--bg) 55%);
  }

  .app{
    max-width: 480px;
    margin: 0 auto;
    padding: 18px 16px 40px;
  }

  /* ヘッダー */
  header{
    text-align: center;
    padding: 18px 0 14px;
  }
  header .logo{
    font-size: 30px;
    letter-spacing: 0.06em;
    font-weight: 800;
    background: linear-gradient(90deg, #00a8c6, #2fd0ee);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .sub{
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* メンバータブ（横スクロール／片手操作しやすい） */
  .tabs{
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 2px 14px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .tabs::-webkit-scrollbar{ display:none; }

  .tab{
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 13.5px;
    font-weight: 600;
    white-space: nowrap;
    transition: transform .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .tab .dot{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--member-color, var(--accent));
    box-shadow: 0 0 6px var(--member-color, var(--accent));
  }
  .tab.active{
    color: #0c1b22;
    background: var(--member-color, var(--accent));
    box-shadow: 0 4px 14px -2px var(--member-color, var(--accent));
  }
  .tab:active{ transform: scale(0.95); }

  /* メンバーカード（現在選択中） */
  .profile-card{
    border-radius: 24px;
    padding: 22px 20px 20px;
    background: linear-gradient(160deg, #ffffff 0%, var(--bg) 100%);
    border: 1px solid var(--card-border);
    position: relative;
    overflow: hidden;
    margin-bottom: 18px;
    box-shadow: 0 6px 20px -10px rgba(12,27,34,0.15);
  }
  .profile-card::before{
    content:"";
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: var(--member-color, var(--accent));
    opacity: 0.18;
    filter: blur(10px);
  }
  .profile-card .name{
    font-size: 21px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .profile-card .name .emoji{ font-size: 22px; }
  .profile-card .role{
    margin-top: 4px;
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .profile-card .accent-line{
    margin-top: 14px;
    height: 3px;
    width: 46px;
    border-radius: 3px;
    background: var(--member-color, var(--accent));
  }

  /* SNSリンク一覧 */
  .links{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-btn{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 15px 16px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid var(--card-border);
    text-decoration: none;
    color: var(--text);
    box-shadow: 0 3px 12px -6px rgba(12,27,34,0.12);
    transition: transform .12s ease, background .2s ease, border-color .2s ease;
  }
  .link-btn:active{
    transform: scale(0.97);
    background: #f2fbfd;
  }
  .link-btn .icon{
    width: 46px; height: 46px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    background: var(--icon-bg, var(--accent-soft));
  }
  .link-btn .label{
    flex: 1;
    min-width: 0;
  }
  .link-btn .label .platform{
    font-size: 15.5px;
    font-weight: 700;
  }
  .link-btn .label .desc{
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-btn .arrow{
    color: var(--text-dim);
    font-size: 18px;
    flex-shrink: 0;
  }

  /* プラットフォームごとの色味 */
  .icon.x{ background: rgba(12,27,34,0.06); }
  .icon.instagram{ background: linear-gradient(135deg, rgba(254,218,117,.25), rgba(214,36,159,.25), rgba(64,93,230,.25)); }
  .icon.tiktok{ background: rgba(37,244,238,0.15); }
  .icon.youtube{ background: rgba(255,0,0,0.15); }

  footer{
    text-align: center;
    margin-top: 30px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
    letter-spacing: 0.05em;
  }

  /* セクションタイトル（TikTokが複数リンクの時用） */
  .group-label{
    font-size: 11px;
    color: var(--text-dim);
    margin: 4px 2px 2px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo">CANDY TUNE</div>
    <div class="sub">推しSNSまとめサイト</div>
  </header>

  <!-- メンバータブ -->
  <nav class="tabs" id="tabs"></nav>

  <!-- 選択中メンバーのプロフィールカード -->
  <section class="profile-card" id="profileCard">
    <div class="name"><span class="emoji" id="profEmoji">🍬</span><span id="profName">公式アカウント</span></div>
    <div class="role" id="profRole">CANDY TUNE Official</div>
    <div class="accent-line"></div>
  </section>

  <!-- SNSリンク一覧 -->
  <div class="links" id="linkList"></div>

  <footer>made with 🍬 for CANDY TUNE fans</footer>
</div>

<script>
  // ===== メンバーデータ =====
  const members = [
    {
      id: "official",
      emoji: "🍬",
      name: "公式アカウント",
      role: "CANDY TUNE Official",
      color: "#2fd0ee",
      links: {
        x: ["https://x.com/candy_tune_?s=21"],
        instagram: ["https://www.instagram.com/candy__tune?igsh=a2RoMjlwOHB0NmM3"],
        tiktok: ["https://vt.tiktok.com/ZSQEyDwbL/", "https://vt.tiktok.com/ZSQEyFSpY/"],
        youtube: ["https://youtube.com/@candy_tune?si=-L4T7k2Yf7UUFs6i"]
      }
    },
    {
      id: "kotomi",
      emoji: "❤️",
      name: "立花琴未",
      role: "Kotomi Tachibana",
      color: "#ff4d6d",
      links: {
        x: ["https://x.com/kotomi_ct0525?s=21"],
        instagram: ["https://www.instagram.com/kotomi_5chan?igsh=MW00N2Ywb2Vja3R6YQ=="],
        tiktok: ["https://vt.tiktok.com/ZSQEUTuCw/"]
      }
    },
    {
      id: "bibian",
      emoji: "🩷",
      name: "村川緋杏",
      role: "Bibian Murakawa",
      color: "#ff8fc7",
      links: {
        x: ["https://x.com/bibian_ct1203?s=21"],
        instagram: ["https://www.instagram.com/murakawabibiann?igsh=OTg4eWk3YWtqZWsw"],
        tiktok: ["https://vt.tiktok.com/ZSQEUX33u/"]
      }
    },
    {
      id: "shizuka",
      emoji: "💜",
      name: "宮野静",
      role: "Shizuka Miyano",
      color: "#b07cf0",
      links: {
        x: ["https://x.com/shizuka_ct0530?s=21"],
        instagram: ["https://www.instagram.com/miyano_shizuka?igsh=b25kNjI3Y2k1MHE0"],
        tiktok: ["https://vt.tiktok.com/ZSQEUttQo/"]
      }
    },
    {
      id: "nachico",
      emoji: "💚",
      name: "小川奈々子",
      role: "Nanako Ogawa",
      color: "#3ddc97",
      links: {
        x: ["https://x.com/nachico_ct1001?s=21"],
        instagram: ["https://www.instagram.com/__nchisan__?igsh=NjdmMzFoaWwydmc0"],
        tiktok: ["https://vt.tiktok.com/ZSQEU7tqy/"]
      }
    },
    {
      id: "natsu",
      emoji: "🧡",
      name: "南なつ",
      role: "Natsu Minami",
      color: "#ff9a4d",
      links: {
        x: ["https://x.com/natsu_ct0317?s=21"],
        instagram: ["https://www.instagram.com/nattanntan?igsh=NHFxNGZ5eHN0dndp"],
        tiktok: ["https://vt.tiktok.com/ZSQEUg5Kd/"]
      }
    },
    {
      id: "mizuki",
      emoji: "💙",
      name: "桐原美月",
      role: "Mizuki Kirihara",
      color: "#4d8dff",
      links: {
        x: ["https://x.com/mizuki_ct0221?s=21"],
        instagram: ["https://www.instagram.com/kirihara_mizuki?igsh=M21sNzB5bXp1OGJs"],
        tiktok: ["https://vt.tiktok.com/ZSQEUTedK/"]
      }
    },
    {
      id: "rino",
      emoji: "🩵",
      name: "福山梨乃",
      role: "Rino Fukuyama",
      color: "#6fdaf0",
      links: {
        x: ["https://x.com/rino_ct1224?s=21"],
        instagram: ["https://www.instagram.com/rinomaru_?igsh=YTlpdzY4ZmJuYWRm"],
        tiktok: ["https://vt.tiktok.com/ZSQEUbFnt/"]
      }
    }
  ];

  const platformMeta = {
    x:         { label: "X (旧Twitter)", icon: "𝕏", cls: "x" },
    instagram: { label: "Instagram",      icon: "📸", cls: "instagram" },
    tiktok:    { label: "TikTok",         icon: "🎵", cls: "tiktok" },
    youtube:   { label: "YouTube",        icon: "▶️", cls: "youtube" }
  };

  const tabsEl = document.getElementById("tabs");
  const linkListEl = document.getElementById("linkList");
  const profileCard = document.getElementById("profileCard");
  const profEmoji = document.getElementById("profEmoji");
  const profName = document.getElementById("profName");
  const profRole = document.getElementById("profRole");

  function shortUrl(url){
    return url.replace(/^https?:\/\//, "").replace(/\?.*$/, "");
  }

  // アプリの専用URLスキームを生成（インストール済みならアプリへ直接遷移）
  function buildAppUrl(platformKey, webUrl){
    try{
      const u = new URL(webUrl);
      const handle = u.pathname.replace(/^\//, "").split("/")[0];
      if (platformKey === "x" && handle) return `twitter://user?screen_name=${handle}`;
      if (platformKey === "instagram" && handle) return `instagram://user?username=${handle}`;
      if (platformKey === "youtube" && handle) return `youtube://www.youtube.com/${handle}`;
      // TikTokの短縮リンクはユーザー名を直接取得できないため、Webリンク（ユニバーサルリンク）に委ねる
      return null;
    }catch(e){
      return null;
    }
  }

  // アプリを直接起動し、アプリが入っていない場合は自動でWeb版にフォールバック
  function openSmart(event, webUrl, appUrl){
    if (!appUrl) return; // アプリスキームが無いプラットフォームは通常のリンク動作に任せる
    event.preventDefault();

    let appOpened = false;
    const markOpened = () => { appOpened = true; };
    document.addEventListener("visibilitychange", markOpened, { once: true });
    window.addEventListener("pagehide", markOpened, { once: true });

    window.location.href = appUrl;

    setTimeout(() => {
      document.removeEventListener("visibilitychange", markOpened);
      if (!appOpened) {
        window.open(webUrl, "_blank", "noopener");
      }
    }, 1200);
  }

  function render(memberId){
    const member = members.find(m => m.id === memberId) || members[0];

    // タブのactive状態更新
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.toggle("active", t.dataset.id === member.id);
    });

    // CSS変数でメンバーカラーを反映
    document.documentElement.style.setProperty("--member-color", member.color);

    // プロフィールカード更新
    profEmoji.textContent = member.emoji;
    profName.textContent = member.name;
    profRole.textContent = member.role;

    // リンク一覧構築
    linkListEl.innerHTML = "";
    Object.keys(member.links).forEach(platformKey => {
      const meta = platformMeta[platformKey];
      const urls = member.links[platformKey];

      urls.forEach((url, idx) => {
        const appUrl = buildAppUrl(platformKey, url);
        const a = document.createElement("a");
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className = "link-btn";
        a.innerHTML = `
          <div class="icon ${meta.cls}">${meta.icon}</div>
          <div class="label">
            <div class="platform">${meta.label}${urls.length > 1 ? " " + (idx + 1) : ""}</div>
            <div class="desc">${shortUrl(url)}</div>
          </div>
          <div class="arrow">›</div>
        `;
        a.addEventListener("click", (e) => openSmart(e, url, appUrl));
        linkListEl.appendChild(a);
      });
    });
  }

  // タブ生成
  members.forEach(member => {
    const btn = document.createElement("button");
    btn.className = "tab";
    btn.dataset.id = member.id;
    btn.style.setProperty("--member-color", member.color);
    btn.innerHTML = `<span class="dot"></span><span>${member.emoji} ${member.name === "公式アカウント" ? "公式" : member.name}</span>`;
    btn.addEventListener("click", () => {
      render(member.id);
      btn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
    });
    tabsEl.appendChild(btn);
  });

  // 初期表示：公式
  render("official");

  // ===== PWA manifest を動的生成してリンク =====
  const manifest = {
    name: "CANDY TUNE 推しSNSまとめ",
    short_name: "CANDY TUNE",
    start_url: ".",
    display: "standalone",
    background_color: "#eaf9fc",
    theme_color: "#eaf9fc",
    icons: []
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  document.getElementById("manifestLink").setAttribute("href", URL.createObjectURL(manifestBlob));

  // スタンドアロン起動時の挙動微調整（リンクタップは別タブ/Safariへ）
  if (window.navigator.standalone) {
    document.documentElement.classList.add("standalone");
  }
</script>

</body>
</html>
